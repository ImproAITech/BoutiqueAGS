<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>

    <!-- ── Dark background ── -->
    <radialGradient id="bgGrad" cx="42%" cy="34%" r="72%">
      <stop offset="0%"   stop-color="#252932"/>
      <stop offset="40%"  stop-color="#111318"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>

    <!-- ── Outer metallic ring ── -->
    <linearGradient id="outerRing" x1="18%" y1="4%" x2="82%" y2="96%">
      <stop offset="0%"   stop-color="#9aa4b2"/>
      <stop offset="22%"  stop-color="#606a78"/>
      <stop offset="48%"  stop-color="#8a94a2"/>
      <stop offset="72%"  stop-color="#424c5a"/>
      <stop offset="100%" stop-color="#788290"/>
    </linearGradient>

    <!-- ── Inner ring (slightly darker) ── -->
    <linearGradient id="innerRing" x1="18%" y1="4%" x2="82%" y2="96%">
      <stop offset="0%"   stop-color="#505a68"/>
      <stop offset="50%"  stop-color="#222830"/>
      <stop offset="100%" stop-color="#3c4652"/>
    </linearGradient>

    <!-- ── Metallic silver for letters ── -->
    <linearGradient id="silver" x1="8%" y1="0%" x2="55%" y2="100%">
      <stop offset="0%"   stop-color="#e6eaee"/>
      <stop offset="18%"  stop-color="#d0d4d8"/>
      <stop offset="42%"  stop-color="#b4b8bc"/>
      <stop offset="68%"  stop-color="#989c9f"/>
      <stop offset="88%"  stop-color="#868a8d"/>
      <stop offset="100%" stop-color="#767a7c"/>
    </linearGradient>

    <!-- ── Slash gradient ── -->
    <linearGradient id="slashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#cdd1d5"/>
      <stop offset="100%" stop-color="#80858a"/>
    </linearGradient>

    <!-- ── Text color ── -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8a9098"/>
      <stop offset="45%"  stop-color="#b0b6bc"/>
      <stop offset="100%" stop-color="#868c92"/>
    </linearGradient>

    <!-- ── Drop shadow for letters (3D depth) ── -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="-1.5" dy="2.5" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <!-- ── Slight inner glow on letters ── -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ══ RINGS ══ -->
  <circle cx="200" cy="200" r="197" fill="url(#outerRing)"/>
  <circle cx="200" cy="200" r="190" fill="url(#innerRing)"/>
  <circle cx="200" cy="200" r="183" fill="url(#bgGrad)"/>

  <!-- ══ LETTER "j" ══ -->

  <!-- dot of the j -->
  <circle cx="152" cy="109" r="12"
    fill="url(#silver)"
    filter="url(#shadow)"/>

  <!-- j stem: slightly italic, runs top-to-bottom, hooks left at the bottom -->
  <path d="
    M 158 126
    C 160 170, 160 215, 154 255
    Q 148 280, 134 293
    Q 118 306, 105 297
    Q  96 289, 100 278
  "
    fill="none"
    stroke="url(#silver)"
    stroke-width="17"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#shadow)"/>

  <!-- ══ LETTER "b" ══ -->

  <!-- b vertical stem -->
  <line x1="197" y1="116" x2="197" y2="264"
    stroke="url(#silver)"
    stroke-width="17"
    stroke-linecap="round"
    filter="url(#shadow)"/>

  <!-- b bowl: a circle whose left edge meets the stem -->
  <circle cx="241" cy="228" r="48"
    fill="none"
    stroke="url(#silver)"
    stroke-width="17"
    filter="url(#shadow)"/>

  <!-- ══ DIAGONAL SLASH ══ -->
  <!-- Goes from upper-left (near j dot area) to lower-right (through b bowl) -->
  <line x1="158" y1="118" x2="268" y2="272"
    stroke="url(#slashGrad)"
    stroke-width="10"
    stroke-linecap="round"/>

  <!-- ══ TEXT ══ -->
  <text
    x="200" y="326"
    font-family="'Helvetica Neue', 'Arial', Helvetica, sans-serif"
    font-size="23"
    font-weight="300"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="0.8">Boutique.Ags</text>

</svg>
